name: validate

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  source-and-docs:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Check out source
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Check shell syntax
        shell: bash
        run: |
          while IFS= read -r file; do
            bash -n "$file" || exit
          done < <(
            find . -type f \( \
              -name '*.sh' \
              -o -path './scripts/uu-remote' \
              -o -path './scripts/uu-remote-bridge' \
            \) -not -path './build/*' -print
          )

      - name: Compile Python
        run: python3 -m compileall -q scripts tests

      - name: Run unit and documentation tests
        run: python3 -m unittest discover -s tests -v

      - name: Validate approved manifests
        run: python3 scripts/patch-gameviewer.py manifests
